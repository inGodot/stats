<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Топ участников</title>
  <link rel="stylesheet" href="style.css?v=1.0">
</head>
<body>

  <div class="app">

    <header class="header">
      <h1>🏆 Топ участников</h1>
      <p class="subtitle">Рейтинг по очкам за все челленджи</p>
    </header>

    <nav class="navigation">
      <a href="index-2.html" class="nav-link active">
        🏆 Рейтинг
      </a>

      <a href="time.html" class="nav-link">
        ⏱ Время участников
      </a>
    </nav>

    <div class="legend">
      <div class="legend-item">
        <span class="dot gold"></span>
        1 место — 5 очков
      </div>

      <div class="legend-item">
        <span class="dot silver"></span>
        2 место — 3 очка
      </div>

      <div class="legend-item">
        <span class="dot bronze"></span>
        3 место — 2 очка
      </div>

      <div class="legend-item">
        <span class="dot base"></span>
        участие — 1 очко
      </div>
    </div>

    <ul class="rating-list" id="ratingList"></ul>

  </div>

  <script>
    const POINTS = {
      first: 5,
      second: 3,
      third: 2,
      participant: 1
    };

    const challenges = [
      {
        first: "Lev",
        second: "Суетолог",
        third: "sirandev",
        others: ["KIRILL", "Danila", "Foront"]
      },
      {
        first: "Lev",
        second: "sirandev",
        third: "Foront",
        others: ["Суетолог", "Станислав"]
      },
      {
        first: "Alexey",
        second: "Alexander",
        third: "firstName lastName",
        others: ["Суетолог", "Foront"]
      }
    ];

    const totals = {};

    function addPoints(name, points) {
      totals[name] = (totals[name] || 0) + points;
    }

    challenges.forEach(challenge => {
      addPoints(challenge.first, POINTS.first);
      addPoints(challenge.second, POINTS.second);
      addPoints(challenge.third, POINTS.third);

      challenge.others.forEach(name => {
        addPoints(name, POINTS.participant);
      });
    });

    const data = Object.entries(totals)
      .map(([name, points]) => ({
        name,
        points
      }))
      .sort((a, b) => {
        if (b.points !== a.points) {
          return b.points - a.points;
        }

        return a.name.localeCompare(b.name, "ru");
      });

    const list = document.getElementById("ratingList");

    data.forEach((user, index) => {
      const place = index + 1;
      const item = document.createElement("li");

      item.className = "rating-item";
      item.style.animationDelay = `${index * 40}ms`;

      let medalClass = "base";
      let medalIcon = "";

      if (place === 1) {
        medalClass = "gold";
        medalIcon = "🥇";
      } else if (place === 2) {
        medalClass = "silver";
        medalIcon = "🥈";
      } else if (place === 3) {
        medalClass = "bronze";
        medalIcon = "🥉";
      }

      item.innerHTML = `
        <div class="place ${medalClass}">
          ${medalIcon || place}
        </div>

        <div class="user-info">
          <div class="user-name">${escapeHtml(user.name)}</div>
        </div>

        <div class="points">
          ${user.points}
          <span class="points-label">очк.</span>
        </div>
      `;

      list.appendChild(item);
    });

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>

</body>
</html>
